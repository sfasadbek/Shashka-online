<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; background: #1a1a1a; 
            margin: 0; font-family: sans-serif; overflow: hidden; color: white;
        }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #menu h1 { color: #f1c40f; margin-bottom: 30px; }
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; }
        #online-list { width: 80%; max-height: 200px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; align-items: center; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #status { font-size: 5vw; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; background: #2c2c2c; padding: 8px 16px; border-radius: 30px; display: inline-block; width: auto; margin-left: auto; margin-right: auto; }
        #board {
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px;
            border: 6px solid #3e2723; display: grid;
            grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            transition: transform 0.5s; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .rotate-board { transform: rotate(180deg); }
        .cell { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .black-cell { background-color: #5d4037; }
        .white-cell { background-color: #d7ccc8; }
        .piece { width: 82%; height: 82%; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; position: relative; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .rotate-piece { transform: rotate(180deg); }
        .white-piece { background: radial-gradient(circle, #ffffff, #e0e0e0); border: 2px solid #aaa; }
        .black-piece { background: radial-gradient(circle, #3a3a3a, #1a1a1a); border: 2px solid #333; }
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #ffeb3b; border: 3px solid #ffeb3b; filter: brightness(1.05); }
        .king::after { content: '👑'; font-size: 6vw; font-weight: bold; text-shadow: 1px 1px 1px rgba(0,0,0,0.3); }
        @media (min-width: 450px) { .king::after { font-size: 32px; } }
        .game-over-msg { background: #e67e22; color: white; }
        .status-active { color: #f1c40f; }
    </style>
</head>
<body>

<div id="menu">
    <h1>♟️ SHASHKA ONLINE</h1>
    <p id="my-name">Yuklanmoqda...</p>
    <h3>🟢 Onlayn o'yinchilar:</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="tg.close()">Chiqish</button>
</div>

<div id="status" style="display:none;">Oqlar yurishi</div>
<div id="board" style="display:none;"></div>

<script>
    // Firebase konfiguratsiyasi
    const firebaseConfig = {
        apiKey: "AIzaSyBCvV83aHz4VXCiUXykAmcxIj3mOCjeKaM",
        authDomain: "shashka-68221.firebaseapp.com",
        databaseURL: "https://shashka-68221-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "shashka-68221",
        storageBucket: "shashka-68221.firebasestorage.app",
        messagingSenderId: "1097688111504",
        appId: "1:1097688111504:web:e53a6b98195760972ebb15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user || { 
        first_name: "Mehmon_" + Math.floor(Math.random()*10000), 
        id: "guest_" + Date.now() + "_" + Math.random() 
    };
    document.getElementById('my-name').innerHTML = "👋 Salom, " + user.first_name;

    // O'yin holati
    let myRole = '';          // 'white' yoki 'black'
    let gameId = '';
    let board = [];           // 8x8
    let turn = 'white';       // kimning navbati
    let selected = null;      // tanlangan dona {r, c}
    let mustJumpAgain = false;
    let gameOver = false;
    let inGame = false;
    let sessionStartTime = Date.now();
    let currentGameRef = null;

    // ========== YORDAMCHI FUNKSIYALAR ==========
    function getInitialBoard() {
        const newBoard = [];
        for (let r = 0; r < 8; r++) {
            newBoard[r] = [];
            for (let c = 0; c < 8; c++) {
                if ((r + c) % 2 !== 0) { // faqat qora kataklar
                    if (r < 3) newBoard[r][c] = { type: 'black', king: false };
                    else if (r > 4) newBoard[r][c] = { type: 'white', king: false };
                    else newBoard[r][c] = null;
                } else {
                    newBoard[r][c] = null;
                }
            }
        }
        return newBoard;
    }

    // Barcha mumkin bo'lgan urish yurishlarini topish (berilgan dona uchun)
    function getCaptureMoves(row, col, piece) {
        if (!piece) return [];
        const moves = [];
        const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
        
        for (let [dr, dc] of dirs) {
            // Oddiy dona uchun faqat 2 masofa, qirol uchun istalgan masofa
            let maxDist = piece.king ? 7 : 2;
            for (let step = 1; step <= maxDist; step++) {
                const midR = row + step * dr;
                const midC = col + step * dc;
                const landR = row + (step + 1) * dr;
                const landC = col + (step + 1) * dc;
                
                if (landR < 0 || landR >= 8 || landC < 0 || landC >= 8) break;
                // Oraliqda dona bo'lishi kerak (raqibniki) va undan keyingi katak bo'sh
                if (board[midR] && board[midR][midC] && board[midR][midC].type !== piece.type && !board[landR][landC]) {
                    // Oddiy dona uchun step faqat 1 bo'lishi kerak (ya'ni 2 katak masofa)
                    if (!piece.king && step !== 1) break;
                    // Qo'shimcha tekshiruv: oraliqda boshqa donalar yo'qligiga ishonch hosil qilish
                    let hasOther = false;
                    for (let k = 1; k < step; k++) {
                        const checkR = row + k * dr;
                        const checkC = col + k * dc;
                        if (board[checkR] && board[checkC]) {
                            hasOther = true;
                            break;
                        }
                    }
                    if (!hasOther) {
                        moves.push({ from: {r: row, c: col}, to: {r: landR, c: landC}, captured: {r: midR, c: midC} });
                    }
                    // Qirol uchun bir yo'nalishda eng yaqin urishni topgandan keyin to'xtatamiz
                    if (!piece.king) break;
                    else break; // Qirol uchun ham birinchi urishni qabul qilamiz (shashka qoidalari)
                }
                // Agar oraliqda o'z donasi yoki raqib donasi bor-u, ammo undan keyin bo'sh joy bo'lmasa, bu yo'nalishda to'xtaymiz
                if (board[midR] && board[midR][midC]) break;
                // Agar qirol bo'lsa va bo'sh kataklar ustidan o'tishda davom etamiz
            }
        }
        return moves;
    }

    // Berilgan pozitsiyada yana urish mumkinmi?
    function canJumpMore(row, col) {
        const piece = board[row][col];
        if (!piece) return false;
        const captures = getCaptureMoves(row, col, piece);
        return captures.length > 0;
    }

    // Firebaseni yangilash
    function updateFirebase() {
        if (!gameId || gameOver) return;
        db.ref('games/' + gameId + '/lastMove').set({
            player: myRole,
            newBoard: board,
            newTurn: turn,
            ts: Date.now()
        });
    }

    // Yurishni bajarish (urish bilan yoki oddiy)
    function executeMove(fromR, fromC, toR, toC, capturedPiece = null) {
        const piece = board[fromR][fromC];
        if (!piece) return false;
        
        // Urilgan donani olib tashlash
        if (capturedPiece) {
            board[capturedPiece.r][capturedPiece.c] = null;
        }
        
        // Donani ko'chirish
        board[toR][toC] = piece;
        board[fromR][fromC] = null;
        
        // Qirolga aylantirish
        if ((piece.type === 'white' && toR === 0) || (piece.type === 'black' && toR === 7)) {
            piece.king = true;
        }
        
        // Urishdan keyin yana urish imkoniyati
        if (capturedPiece && canJumpMore(toR, toC)) {
            selected = { r: toR, c: toC };
            mustJumpAgain = true;
        } else {
            selected = null;
            mustJumpAgain = false;
            turn = (turn === 'white') ? 'black' : 'white';
        }
        updateFirebase();
        render();
        return true;
    }

    // Yurishni tekshirish (oddiy va urish)
    function tryMove(fromR, fromC, toR, toC) {
        const piece = board[fromR][fromC];
        if (!piece) return false;
        if (board[toR][toC] !== null) return false;
        
        const rowDiff = toR - fromR;
        const colDiff = toC - fromC;
        const absRow = Math.abs(rowDiff);
        const absCol = Math.abs(colDiff);
        if (absRow !== absCol || absRow === 0) return false;
        
        const stepRow = Math.sign(rowDiff);
        const stepCol = Math.sign(colDiff);
        
        // Urish yurishlarini aniqlash
        let capturedPiece = null;
        let isJump = false;
        
        // Oraliqdagi donalarni topish
        let piecesInBetween = [];
        for (let i = 1; i < absRow; i++) {
            const midR = fromR + i * stepRow;
            const midC = fromC + i * stepCol;
            if (board[midR][midC]) {
                piecesInBetween.push({ r: midR, c: midC, type: board[midR][midC].type });
            }
        }
        
        // Urish holati: aynan 1 ta raqib donasi va qo'nish katagi bo'sh
        if (piecesInBetween.length === 1 && piecesInBetween[0].type !== piece.type) {
            const captured = piecesInBetween[0];
            // Urilgan dona bilan qo'nish katagi orasidagi masofa 1 bo'lishi kerak
            const distToCapture = Math.abs(captured.r - fromR);
            const distCaptureToLand = Math.abs(toR - captured.r);
            if (distCaptureToLand === 1 && distToCapture >= 1) {
                // Oddiy dona uchun masofa aniq 2 (from -> captured = 1, captured -> land = 1)
                if (!piece.king && (absRow !== 2 || distToCapture !== 1)) return false;
                // Qirol uchun oraliqda boshqa donalar yo'qligi allaqachon tekshirilgan
                capturedPiece = captured;
                isJump = true;
            } else {
                return false;
            }
        }
        // Oddiy yurish (hech qanday dona oralig'ida)
        else if (piecesInBetween.length === 0 && !mustJumpAgain) {
            if (absRow !== 1) return false;
            if (!piece.king) {
                if (piece.type === 'white' && rowDiff > 0) return false;
                if (piece.type === 'black' && rowDiff < 0) return false;
            }
            return executeMove(fromR, fromC, toR, toC, null);
        }
        else {
            return false;
        }
        
        // Urish yurishini bajarish
        if (isJump && capturedPiece) {
            return executeMove(fromR, fromC, toR, toC, capturedPiece);
        }
        return false;
    }

    // ========== INTERFEYS ==========
    function render() {
        const boardDiv = document.getElementById('board');
        if (!boardDiv || !board || board.length === 0) return;
        
        boardDiv.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white-cell' : 'black-cell'}`;
                // Klikk hodisasiga haqiqiy koordinatalarni uzatamiz (keyin black uchun o'zgartiriladi)
                cell.onclick = (function(row, col) { 
                    return function() { handleClick(row, col); };
                })(r, c);
                
                const piece = board[r][c];
                if (piece) {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = `piece ${piece.type}-piece ${piece.king ? 'king' : ''}`;
                    if (myRole === 'black') pieceDiv.classList.add('rotate-piece');
                    if (selected && selected.r === r && selected.c === c) {
                        pieceDiv.classList.add('selected');
                    }
                    cell.appendChild(pieceDiv);
                }
                boardDiv.appendChild(cell);
            }
        }
        
        // Statusni yangilash
        const statusDiv = document.getElementById('status');
        if (gameOver) {
            // g'olib allaqachon ko'rsatilgan
        } else {
            statusDiv.innerText = turn === 'white' ? "⚪ Oqlar yurishi" : "⚫ Qoralar yurishi";
            if (turn === myRole && !gameOver) {
                statusDiv.style.color = "#f1c40f";
                statusDiv.style.backgroundColor = "#2c2c2c";
            } else {
                statusDiv.style.color = "#aaa";
            }
        }
        checkWinner();
    }
    
    function handleClick(visualRow, visualCol) {
        if (gameOver) return;
        if (!inGame || turn !== myRole) return;
        
        // Qora o'yinchi uchun koordinatalarni aylantirish (board 180° burilgan)
        let row = visualRow;
        let col = visualCol;
        if (myRole === 'black') {
            row = 7 - visualRow;
            col = 7 - visualCol;
        }
        
        // Majburiy urish holatida faqat tanlangan dona bilan harakat qilish mumkin
        if (mustJumpAgain && (!selected || selected.r !== row || selected.c !== col)) {
            // Agar tanlangan dona bo'lmasa yoki boshqa dona bosilsa, hech narsa qilma
            return;
        }
        
        const piece = board[row][col];
        if (selected) {
            if (piece && piece.type === turn && !mustJumpAgain) {
                // Boshqa donani tanlash
                selected = { r: row, c: col };
                render();
            } else {
                // Tanlangan donani harakatlantirish
                tryMove(selected.r, selected.c, row, col);
                render();
            }
        } else if (piece && piece.type === turn) {
            selected = { r: row, c: col };
            render();
        }
    }
    
    function checkWinner() {
        if (!board || board.length === 0) return;
        let whiteCount = 0, blackCount = 0;
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const p = board[r][c];
                if (p && p.type === 'white') whiteCount++;
                if (p && p.type === 'black') blackCount++;
            }
        }
        if (whiteCount === 0) {
            gameOver = true;
            document.getElementById('status').innerHTML = "🏆 O'YIN TUGADI! QORALAR YUTDI! 🏆";
            document.getElementById('status').style.color = "#2ecc71";
            setTimeout(() => endGameAndExit(), 4000);
        } else if (blackCount === 0) {
            gameOver = true;
            document.getElementById('status').innerHTML = "🏆 O'YIN TUGADI! OQLAR YUTDI! 🏆";
            document.getElementById('status').style.color = "#2ecc71";
            setTimeout(() => endGameAndExit(), 4000);
        }
    }
    
    function endGameAndExit() {
        if (gameId) {
            db.ref('games/' + gameId + '/lastMove').remove();
            if (currentGameRef) currentGameRef.off();
        }
        db.ref('presence/' + user.id).update({ inGame: false });
        setTimeout(() => location.reload(), 500);
    }
    
    // ========== OYINNI BOSHLASH ==========
    function startGame(gameIdentifier, role) {
        if (inGame) return;
        inGame = true;
        gameId = gameIdentifier;
        myRole = role;
        
        if (currentGameRef) currentGameRef.off();
        currentGameRef = db.ref('games/' + gameId + '/lastMove');
        
        // Boshlang'ich doska
        board = getInitialBoard();
        turn = 'white';
        selected = null;
        mustJumpAgain = false;
        gameOver = false;
        
        // UI ni tayyorlash
        document.getElementById('menu').style.display = 'none';
        document.getElementById('board').style.display = 'grid';
        document.getElementById('status').style.display = 'block';
        
        if (myRole === 'black') {
            document.getElementById('board').classList.add('rotate-board');
        } else {
            document.getElementById('board').classList.remove('rotate-board');
        }
        
        // Firebase realtime sync
        currentGameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.newBoard && Array.isArray(data.newBoard) && data.newBoard.length === 8) {
                // Qabul qilingan yangi holat
                board = data.newBoard;
                turn = data.newTurn;
                selected = null;
                mustJumpAgain = false;
                render();
            } else if (!data && myRole === 'white') {
                // Hech qanday harakat yo'q, white boshlovchi bo'lsa boshlang'ich holatni yozamiz
                if (board && JSON.stringify(board) === JSON.stringify(getInitialBoard()) && turn === 'white' && !gameOver) {
                    updateFirebase();
                }
            }
        });
        
        // White boshlovchi bo'lsa, boshlang'ich holatni bir marta yozish
        if (myRole === 'white') {
            setTimeout(() => {
                if (board && JSON.stringify(board) === JSON.stringify(getInitialBoard()) && turn === 'white' && !gameOver && inGame) {
                    updateFirebase();
                }
            }, 500);
        }
        
        render();
        db.ref('presence/' + user.id).update({ inGame: true });
    }
    
    // ========== TAKLIF VA ONLINE ==========
    function invite(targetId) {
        if (inGame) {
            alert("Siz allaqachon o'yindasiz!");
            return;
        }
        db.ref('invites/' + targetId).set({ 
            fromId: user.id, 
            fromName: user.first_name, 
            ts: Date.now() 
        });
        alert("✅ Taklif yuborildi!");
    }
    
    // ========== BOSHLANG'ICH HOLAT ==========
    // Presence va onlayn ro'yxat (o'zini ko'rsatmaslik)
    db.ref('presence/' + user.id).set({ name: user.first_name, online: true, inGame: false });
    db.ref('presence/' + user.id).onDisconnect().remove();
    
    db.ref('presence').on('value', (snap) => {
        const listDiv = document.getElementById('online-list');
        listDiv.innerHTML = '';
        let hasAny = false;
        snap.forEach((child) => {
            // O'zini va o'yindagi foydalanuvchilarni ko'rsatmaslik
            if (child.key !== user.id && !child.val().inGame) {
                hasAny = true;
                listDiv.innerHTML += `<div class="user-item">
                    <span>👤 ${escapeHtml(child.val().name)}</span> 
                    <button class="invite-btn" onclick="window.invite('${child.key}')">🎮 Taklif</button>
                </div>`;
            }
        });
        if (!hasAny) listDiv.innerHTML = '<div style="padding:10px; text-align:center;">Hozircha boshqa o‘yinchilar yo‘q</div>';
    });
    
    // XSS hujumlaridan himoya
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Invite qabul qilish
    db.ref('invites/' + user.id).on('value', (snap) => {
        const inv = snap.val();
        if (inv && !inGame && inv.ts > sessionStartTime - 5000) {
            if (confirm(`${inv.fromName} sizni shashka o'ynashga taklif qildi. Qabul qilasizmi?`)) {
                const newGameId = inv.fromId + "_" + user.id;
                gameId = newGameId;
                myRole = 'black';
                db.ref('invites/' + user.id).remove();
                db.ref('games/' + gameId).set({ start: true, createdAt: Date.now() });
                startGame(gameId, 'black');
            } else {
                db.ref('invites/' + user.id).remove();
            }
        }
    });
    
    // Agar kimdir menga o'yin yaratgan bo'lsa (white roli)
    db.ref('games').on('child_added', (snap) => {
        const gameVal = snap.val();
        if (!inGame && snap.key.startsWith(user.id + "_") && gameVal && gameVal.createdAt > sessionStartTime - 10000) {
            startGame(snap.key, 'white');
        }
    });
    
    // Global funksiyalar
    window.invite = invite;
    window.tg = tg;
    
    // Sahifa yopilganda tozalash
    window.addEventListener('beforeunload', () => {
        if (gameId && currentGameRef) currentGameRef.off();
        db.ref('presence/' + user.id).remove();
    });
    
    console.log("Shashka o'yini tayyor. Barcha xatolar tuzatildi.");
</script>
</body>
</html>
