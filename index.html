<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; background: #1a1a1a; 
            margin: 0; font-family: sans-serif; overflow: hidden; color: white;
        }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #menu h1 { color: #f1c40f; margin-bottom: 30px; }
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; }
        #online-list { width: 80%; max-height: 200px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; align-items: center; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #status { font-size: 5vw; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; }
        #board {
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px;
            border: 6px solid #3e2723; display: grid;
            grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            transition: transform 0.5s;
        }
        .rotate-board { transform: rotate(180deg); }
        .cell { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .black-cell { background-color: #5d4037; }
        .white-cell { background-color: #d7ccc8; }
        .piece { width: 82%; height: 82%; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; position: relative; }
        .rotate-piece { transform: rotate(180deg); }
        .white-piece { background: radial-gradient(circle, #ffffff, #cccccc); border: 2px solid #999; }
        .black-piece { background: radial-gradient(circle, #424242, #000); border: 2px solid #111; }
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #ffeb3b; border: 3px solid #ffeb3b; }
        .king::after { content: '♔'; color: #f1c40f; font-size: 7vw; font-weight: bold; }
        @media (min-width: 450px) { .king::after { font-size: 35px; } }
    </style>
</head>
<body>

<div id="menu">
    <h1>SHASHKA ONLINE</h1>
    <p id="my-name">Yuklanmoqda...</p>
    <h3>Online foydalanuvchilar:</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="tg.close()">Chiqish</button>
</div>

<div id="status" style="display:none;">Oqlar yurishi</div>
<div id="board" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBCvV83aHz4VXCiUXykAmcxIj3mOCjeKaM",
        authDomain: "shashka-68221.firebaseapp.com",
        databaseURL: "https://shashka-68221-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "shashka-68221",
        storageBucket: "shashka-68221.firebasestorage.app",
        messagingSenderId: "1097688111504",
        appId: "1:1097688111504:web:e53a6b98195760972ebb15",
        measurementId: "G-2Z0DCPLV6X"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user || { 
        first_name: "Mehmon_" + Math.floor(Math.random()*1000), 
        id: "guest_" + Date.now() 
    };
    document.getElementById('my-name').innerText = "Salom, " + user.first_name;

    let myRole = ''; 
    let gameId = '';
    let board = [];
    let turn = 'white';
    let selected = null;
    let mustJumpAgain = false;
    let gameOver = false;
    let inGame = false;
    let sessionStartTime = Date.now();

    db.ref('presence/' + user.id).set({ name: user.first_name, online: true, inGame: false });
    db.ref('presence/' + user.id).onDisconnect().remove();

    db.ref('presence').on('value', (snap) => {
        const list = document.getElementById('online-list');
        list.innerHTML = '';
        snap.forEach((child) => {
            if(child.key != user.id && !child.val().inGame) {
                list.innerHTML += `<div class="user-item">
                    <span>${child.val().name}</span> 
                    <button class="invite-btn" onclick="invite('${child.key}')">Taklif</button>
                </div>`;
            }
        });
    });

    function invite(targetId) {
        db.ref('invites/' + targetId).set({ fromId: user.id, fromName: user.first_name, ts: Date.now() });
        alert("Taklif yuborildi...");
    }

    db.ref('invites/' + user.id).on('value', (snap) => {
        const val = snap.val();
        if(val && !inGame && val.ts > sessionStartTime) {
            if(confirm(val.fromName + " taklif yubordi. Qabul qilasizmi?")) {
                gameId = val.fromId + "_" + user.id;
                myRole = 'black';
                db.ref('invites/' + user.id).remove();
                db.ref('games/' + gameId).set({ start: true, createdAt: Date.now() });
                startGame(gameId);
            } else {
                db.ref('invites/' + user.id).remove();
            }
        }
    });

    db.ref('games').on('child_added', (snap) => {
        const val = snap.val();
        if (!inGame && snap.key.startsWith(user.id + "_") && val.createdAt > sessionStartTime) {
            gameId = snap.key;
            myRole = 'white';
            startGame(gameId);
        }
    });

    function startGame(id) {
        inGame = true;
        gameId = id;
        db.ref('presence/' + user.id).update({ inGame: true });
        document.getElementById('menu').style.display = 'none';
        document.getElementById('board').style.display = 'grid';
        document.getElementById('status').style.display = 'block';
        if (myRole === 'black') document.getElementById('board').classList.add('rotate-board');
        if (myRole === 'white') initBoard();

        db.ref('games/' + id + '/lastMove').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                board = data.newBoard;
                turn = data.newTurn;
                selected = null;
                mustJumpAgain = false;
                render();
            }
        });
    }

    function initBoard() {
        board = [];
        for (let r = 0; r < 8; r++) {
            board[r] = [];
            for (let c = 0; c < 8; c++) {
                let piece = null;
                if ((r + c) % 2 !== 0) {
                    if (r < 3) piece = { type: 'black', king: false };
                    else if (r > 4) piece = { type: 'white', king: false };
                }
                board[r][c] = piece;
            }
        }
        updateFirebase();
        render();
    }

    function render() {
        const bDiv = document.getElementById('board');
        bDiv.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white-cell' : 'black-cell'}`;
                cell.onclick = () => handleClick(r, c);
                if (board[r] && board[r][c]) {
                    const p = document.createElement('div');
                    p.className = `piece ${board[r][c].type}-piece ${board[r][c].king ? 'king' : ''}`;
                    if (myRole === 'black') p.classList.add('rotate-piece');
                    if (selected && selected.r === r && selected.c === c) p.classList.add('selected');
                    cell.appendChild(p);
                }
                bDiv.appendChild(cell);
            }
        }
        const sDiv = document.getElementById('status');
        sDiv.innerText = turn === 'white' ? "Oqlar yurishi" : "Qoralar yurishi";
        sDiv.style.color = (turn === myRole) ? "#f1c40f" : "white";
        checkWinner();
    }

    function handleClick(r, c) {
        if (gameOver || turn !== myRole) return;
        const piece = board[r][c];
        if (selected) {
            if (piece && piece.type === turn && !mustJumpAgain) {
                selected = { r, c };
            } else {
                tryMove(selected.r, selected.c, r, c);
            }
        } else if (piece && piece.type === turn) {
            selected = { r, c };
        }
        render();
    }

    function tryMove(fR, fC, tR, tC) {
        if (board[tR][tC] !== null) return;
        const rd = tR - fR, cd = tC - fC;
        const ar = Math.abs(rd), ac = Math.abs(cd);
        if (ar !== ac) return;

        const p = board[fR][fC];
        const rs = rd / ar, cs = cd / ac;
        let piecesInWay = [];

        for (let i = 1; i < ar; i++) {
            let currR = fR + i * rs, currC = fC + i * cs;
            if (board[currR][currC]) piecesInWay.push({ r: currR, c: currC, type: board[currR][currC].type });
        }

        // Oddiy yurish
        if (piecesInWay.length === 0 && !mustJumpAgain) {
            if (!p.king) {
                if (ar !== 1) return;
                if (p.type === 'white' && rd > 0) return;
                if (p.type === 'black' && rd < 0) return;
            }
            executeMove(fR, fC, tR, tC);
        } 
        // Yeyish
        else if (piecesInWay.length === 1 && piecesInWay[0].type !== p.type) {
            if (!p.king && ar !== 2) return;
            board[piecesInWay[0].r][piecesInWay[0].c] = null;
            executeMove(fR, fC, tR, tC, true);
        }
    }

    function executeMove(fR, fC, tR, tC, wasJump = false) {
        let p = board[fR][fC];
        if ((p.type === 'white' && tR === 0) || (p.type === 'black' && tR === 7)) p.king = true;
        board[tR][tC] = p;
        board[fR][fC] = null;

        if (wasJump && canJumpMore(tR, tC)) {
            selected = { r: tR, c: tC };
            mustJumpAgain = true;
        } else {
            selected = null;
            mustJumpAgain = false;
            turn = turn === 'white' ? 'black' : 'white';
        }
        updateFirebase();
        render();
    }

    function canJumpMore(r, c) {
        const p = board[r][c];
        const ds = [[1,1], [1,-1], [-1,1], [-1,-1]];
        for (let [dr, dc] of ds) {
            let limit = p.king ? 7 : 2;
            for (let i = 1; i < limit; i++) {
                let mR = r + i * dr, mC = c + i * dc, tR = r + (i+1) * dr, tC = c + (i+1) * dc;
                if (tR >= 0 && tR < 8 && tC >= 0 && tC < 8) {
                    if (board[mR][mC] && board[mR][mC].type !== p.type && !board[tR][tC]) return true;
                    if (board[mR][mC]) break;
                }
            }
        }
        return false;
    }

    function updateFirebase() {
        db.ref('games/' + gameId + '/lastMove').set({
            player: myRole,
            newBoard: board,
            newTurn: turn,
            ts: Date.now()
        });
    }

    function checkWinner() {
        let w = 0, b = 0;
        board.forEach(row => row.forEach(p => { if(p?.type==='white') w++; if(p?.type==='black') b++; }));
        if (board.length > 0 && (w === 0 || b === 0)) {
            document.getElementById('status').innerText = "O'YIN TUGADI! " + (w === 0 ? "QORALAR" : "OQLAR") + " YUTDI!";
            gameOver = true;
            setTimeout(() => location.reload(), 5000);
        }
    }
</script>
</body>
</html>
