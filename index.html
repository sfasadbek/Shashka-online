<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* CSS qismi o'zgarishsiz qoldi */
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; background: #1a1a1a; 
            margin: 0; font-family: sans-serif; overflow: hidden; color: white;
        }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #menu h1 { color: #f1c40f; margin-bottom: 30px; }
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; }
        #online-list { width: 80%; max-height: 200px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; align-items: center; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #status { font-size: 5vw; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; background: #2c2c2c; padding: 8px 16px; border-radius: 30px; display: inline-block; width: auto; margin-left: auto; margin-right: auto; }
        #board {
            width: 95vw; height: 95vw; max-width: 450px; max-height: 450px;
            border: 6px solid #3e2723; display: grid;
            grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            transition: transform 0.5s; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .rotate-board { transform: rotate(180deg); }
        .cell { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .black-cell { background-color: #5d4037; }
        .white-cell { background-color: #d7ccc8; }
        .piece { width: 82%; height: 82%; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; position: relative; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .rotate-piece { transform: rotate(180deg); }
        .white-piece { background: radial-gradient(circle, #ffffff, #e0e0e0); border: 2px solid #aaa; }
        .black-piece { background: radial-gradient(circle, #3a3a3a, #1a1a1a); border: 2px solid #333; }
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #ffeb3b; border: 3px solid #ffeb3b; filter: brightness(1.05); }
        .king::after { content: '👑'; font-size: 6vw; font-weight: bold; text-shadow: 1px 1px 1px rgba(0,0,0,0.3); }
        @media (min-width: 450px) { .king::after { font-size: 32px; } }
    </style>
</head>
<body>

<div id="menu">
    <h1>♟️ SHASHKA ONLINE</h1>
    <p id="my-name">Yuklanmoqda...</p>
    <h3>🟢 Onlayn o'yinchilar:</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="tg.close()">Chiqish</button>
</div>

<div id="status" style="display:none;">Oqlar yurishi</div>
<div id="board" style="display:none;"></div>

<script>
    // Firebase Config (O'zingizniki qoldi)
    const firebaseConfig = {
        apiKey: "AIzaSyBCvV83aHz4VXCiUXykAmcxIj3mOCjeKaM",
        authDomain: "shashka-68221.firebaseapp.com",
        databaseURL: "https://shashka-68221-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "shashka-68221",
        storageBucket: "shashka-68221.firebasestorage.app",
        messagingSenderId: "1097688111504",
        appId: "1:1097688111504:web:e53a6b98195760972ebb15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user || { 
        first_name: "Mehmon_" + Math.floor(Math.random()*10000), 
        id: "guest_" + Date.now()
    };
    document.getElementById('my-name').innerHTML = "👋 Salom, " + user.first_name;

    let myRole = '';
    let gameId = '';
    let board = [];
    let turn = 'white';
    let selected = null;
    let mustJumpAgain = false;
    let gameOver = false;
    let inGame = false;
    let sessionStartTime = Date.now();
    let currentGameRef = null;

    function getInitialBoard() {
        const newBoard = [];
        for (let r = 0; r < 8; r++) {
            newBoard[r] = [];
            for (let c = 0; c < 8; c++) {
                if ((r + c) % 2 !== 0) {
                    if (r < 3) newBoard[r][c] = { type: 'black', king: false };
                    else if (r > 4) newBoard[r][c] = { type: 'white', king: false };
                    else newBoard[r][c] = "empty"; // null o'rniga "empty" (Firebase uchun xavfsizroq)
                } else {
                    newBoard[r][c] = "empty";
                }
            }
        }
        return newBoard;
    }

    function updateFirebase() {
        if (!gameId || gameOver) return;
        db.ref('games/' + gameId + '/lastMove').set({
            player: myRole,
            newBoard: JSON.stringify(board), // Massivni string qilib saqlash (xatolikni oldini oladi)
            newTurn: turn,
            ts: Date.now()
        });
    }

    function executeMove(fromR, fromC, toR, toC, capturedPiece = null) {
        const piece = board[fromR][fromC];
        if (capturedPiece) board[capturedPiece.r][capturedPiece.c] = "empty";
        
        board[toR][toC] = piece;
        board[fromR][fromC] = "empty";

        if ((piece.type === 'white' && toR === 0) || (piece.type === 'black' && toR === 7)) {
            piece.king = true;
        }

        if (capturedPiece && getCaptureMoves(toR, toC, board[toR][toC]).length > 0) {
            selected = { r: toR, c: toC };
            mustJumpAgain = true;
        } else {
            selected = null;
            mustJumpAgain = false;
            turn = (turn === 'white') ? 'black' : 'white';
        }
        
        updateFirebase();
        render();
        return true;
    }

    function getCaptureMoves(row, col, piece) {
        if (!piece || piece === "empty") return [];
        const moves = [];
        const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
        for (let [dr, dc] of dirs) {
            const midR = row + dr, midC = col + dc;
            const landR = row + 2 * dr, landC = col + 2 * dc;
            if (landR >= 0 && landR < 8 && landC >= 0 && landC < 8) {
                const midPiece = board[midR][midC];
                if (midPiece !== "empty" && midPiece.type !== piece.type && board[landR][landC] === "empty") {
                    moves.push({ from: {r: row, c: col}, to: {r: landR, c: landC}, captured: {r: midR, c: midC} });
                }
            }
        }
        return moves;
    }

    function tryMove(fromR, fromC, toR, toC) {
        const piece = board[fromR][fromC];
        const rowDiff = toR - fromR;
        const absRow = Math.abs(rowDiff);
        const absCol = Math.abs(toC - fromC);

        if (absRow !== absCol || board[toR][toC] !== "empty") return false;

        // Oddiy yurish (sakrashsiz)
        if (absRow === 1 && !mustJumpAgain) {
            if (!piece.king) {
                if (piece.type === 'white' && rowDiff > 0) return false;
                if (piece.type === 'black' && rowDiff < 0) return false;
            }
            return executeMove(fromR, fromC, toR, toC);
        }

        // Sakrash
        if (absRow === 2) {
            const midR = fromR + rowDiff / 2;
            const midC = fromC + (toC - fromC) / 2;
            const midPiece = board[midR][midC];
            if (midPiece !== "empty" && midPiece.type !== piece.type) {
                return executeMove(fromR, fromC, toR, toC, {r: midR, c: midC});
            }
        }
        return false;
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white-cell' : 'black-cell'}`;
                cell.onclick = () => handleClick(r, c);
                const piece = board[r][c];
                if (piece && piece !== "empty") {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = `piece ${piece.type}-piece ${piece.king ? 'king' : ''}`;
                    if (myRole === 'black') pieceDiv.classList.add('rotate-piece');
                    if (selected && selected.r === r && selected.c === c) pieceDiv.classList.add('selected');
                    cell.appendChild(pieceDiv);
                }
                boardDiv.appendChild(cell);
            }
        }
        document.getElementById('status').innerText = turn === 'white' ? "⚪ Oqlar yurishi" : "⚫ Qoralar yurishi";
        checkWinner();
    }

    function handleClick(r, c) {
        if (gameOver || turn !== myRole) return;
        const piece = board[r][c];
        if (selected) {
            if (piece !== "empty" && piece.type === turn && !mustJumpAgain) {
                selected = { r: r, c: c };
            } else {
                tryMove(selected.r, selected.c, r, c);
            }
        } else if (piece !== "empty" && piece.type === turn) {
            selected = { r: r, c: c };
        }
        render();
    }

    function checkWinner() {
        let w = 0, b = 0;
        board.forEach(row => row.forEach(p => {
            if (p.type === 'white') w++;
            if (p.type === 'black') b++;
        }));
        if (w === 0 || b === 0) {
            gameOver = true;
            document.getElementById('status').innerText = w === 0 ? "🏆 Qoralar yutdi!" : "🏆 Oqlar yutdi!";
            setTimeout(() => location.reload(), 5000);
        }
    }

    function startGame(id, role, existingBoard = null) {
        inGame = true;
        gameId = id;
        myRole = role;
        board = existingBoard ? JSON.parse(existingBoard) : getInitialBoard();
        
        document.getElementById('menu').style.display = 'none';
        document.getElementById('board').style.display = 'grid';
        document.getElementById('status').style.display = 'block';
        if (myRole === 'black') document.getElementById('board').classList.add('rotate-board');

        currentGameRef = db.ref('games/' + gameId + '/lastMove');
        currentGameRef.on('value', (snap) => {
            const data = snap.val();
            if (data && data.player !== myRole) {
                board = JSON.parse(data.newBoard);
                turn = data.newTurn;
                render();
            }
        });
        render();
        db.ref('presence/' + user.id).update({ inGame: true });
    }

    // Taklif yuborish
    window.invite = function(targetId) {
        const newGameId = user.id + "_" + targetId;
        db.ref('invites/' + targetId).set({ fromId: user.id, fromName: user.first_name, gameId: newGameId, ts: Date.now() });
        startGame(newGameId, 'white');
    };

    // Takliflarni eshitish
    db.ref('invites/' + user.id).on('value', (snap) => {
        const inv = snap.val();
        if (inv && !inGame && inv.ts > sessionStartTime) {
            if (confirm(inv.fromName + " taklif qildi. Qabul qilasizmi?")) {
                db.ref('invites/' + user.id).remove();
                startGame(inv.gameId, 'black');
            }
        }
    });

    // Onlayn foydalanuvchilar (O'zingizniki qoldi)
    db.ref('presence/' + user.id).set({ name: user.first_name, online: true, inGame: false });
    db.ref('presence').on('value', (snap) => {
        const listDiv = document.getElementById('online-list');
        listDiv.innerHTML = '';
        snap.forEach(child => {
            if (child.key !== user.id && !child.val().inGame) {
                listDiv.innerHTML += `<div class="user-item"><span>👤 ${child.val().name}</span> <button class="invite-btn" onclick="invite('${child.key}')">🎮 Taklif</button></div>`;
            }
        });
    });

</script>
</body>
</html>
