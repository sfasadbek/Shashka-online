<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- LOADING PROGRESS BAR CSS --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .progress-container {
            width: 70%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #2ecc71; /* Yashil rang */
            box-shadow: 0 0 15px #2ecc71;
            transition: width 0.3s ease;
        }
        #loading-text {
            color: white;
            font-size: 18px;
            font-family: sans-serif;
            letter-spacing: 2px;
        }

        /* --- ASOSIY CSS QISMI --- */
        * { box-sizing: border-box; touch-action: manipulation; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; margin: 0; font-family: sans-serif; overflow: hidden; color: white; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #menu h1 { color: #f1c40f; margin-bottom: 30px; }
        #leaderboard-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; background: #2c2c2c; padding: 10px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #f1c40f; }
        #leaderboard-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .leaderboard-content { width: 90%; max-width: 400px; background: #2c2c2c; border-radius: 15px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; font-size: 14px; }
        .win-text { color: #2ecc71; font-weight: bold; }
        .loss-text { color: #e74c3c; font-weight: bold; }
        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; }
        #online-list { width: 80%; max-height: 200px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; align-items: center; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        #status { font-size: 5vw; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; text-align: center; background: #2c2c2c; padding: 8px 20px; border-radius: 30px; display: inline-block; width: auto; min-width: 200px; }
        #board { width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; border: 6px solid #3e2723; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); transition: transform 0.5s; box-shadow: 0 10px 25px rgba(0,0,0,0.5); background-color: #d7ccc8; }
        .rotate-board { transform: rotate(180deg); }
        .cell { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .black-cell { background-color: #5d4037; }
        .white-cell { background-color: #d7ccc8; }
        .piece { width: 82%; height: 82%; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: transform 0.2s; position: relative; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
        .rotate-piece { transform: rotate(180deg); }
        .white-piece { background: radial-gradient(circle, #ffffff, #e0e0e0); border: 2px solid #aaa; }
        .black-piece { background: radial-gradient(circle, #3a3a3a, #1a1a1a); border: 2px solid #333; }
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #ffeb3b; border: 3px solid #ffeb3b; filter: brightness(1.1); }
        .king::after { content: '👑'; font-size: 6vw; font-weight: bold; text-shadow: 1px 1px 1px rgba(0,0,0,0.3); }
        #resign-btn { margin-top: 30px; background: #e74c3c; color: white; display: none; padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="loading-text">YUKLANMOQDA...</div>
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
</div>

<div id="menu" style="display: none;">
    <div id="leaderboard-btn" onclick="toggleLeaderboard(true)">🏆</div>
    <h1>♟️ SHASHKA ONLINE</h1>
    <p id="my-name">Yuklanmoqda...</p>
    <h3>🟢 Onlayn o'yinchilar:</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="tg.close()">Chiqish</button>
</div>

<div id="leaderboard-modal">
    <h2>🏆 Eng yaxshilar</h2>
    <div class="leaderboard-content" id="leaderboard-list">Yuklanmoqda...</div>
    <button class="btn" style="width: 200px;" onclick="toggleLeaderboard(false)">Yopish</button>
</div>

<div id="status" style="display:none;">Oqlar yurishi</div>
<div id="board" style="display:none;"></div>
<button id="resign-btn" onclick="resignGame()">🏳️ Taslim bo'lish</button>

<script>
    // --- LOADING ANIMATSIYASI ---
    function startLoading() {
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
            } else {
                width += 2; // Yuklanish tezligi
                bar.style.width = width + '%';
            }
        }, 30); // Har 30ms da yangilanadi
    }
    // Sahifa yuklanganda ishga tushadi
    window.onload = startLoading;

    // --- FIREBASE VA O'YIN LOGIKASI (O'ZGARMAGAN) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBCvV83aHz4VXCiUXykAmcxIj3mOCjeKaM",
        authDomain: "shashka-68221.firebaseapp.com",
        databaseURL: "https://shashka-68221-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "shashka-68221",
        storageBucket: "shashka-68221.firebasestorage.app",
        messagingSenderId: "1097688111504",
        appId: "1:1097688111504:web:e53a6b98195760972ebb15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user || { first_name: "Mehmon_" + Math.floor(Math.random()*10000), id: "guest_" + Date.now() };
    document.getElementById('my-name').innerHTML = "👋 Salom, " + user.first_name;

    let myRole = '', gameId = '', board = [], turn = 'white', selected = null, mustJumpAgain = false, gameOver = false, inGame = false, opponentId = '', sessionStartTime = Date.now();

    function getInitialBoard() {
        const newBoard = [];
        for (let r = 0; r < 8; r++) {
            newBoard[r] = [];
            for (let c = 0; c < 8; c++) {
                if ((r + c) % 2 !== 0) {
                    if (r < 3) newBoard[r][c] = { type: 'black', king: false };
                    else if (r > 4) newBoard[r][c] = { type: 'white', king: false };
                    else newBoard[r][c] = "empty";
                } else newBoard[r][c] = "empty";
            }
        }
        return newBoard;
    }

    function updateStats(won) {
        db.ref('stats/' + user.id).transaction((current) => {
            if (current === null) return { name: user.first_name, wins: won ? 1 : 0, losses: won ? 0 : 1 };
            if (won) current.wins = (current.wins || 0) + 1;
            else current.losses = (current.losses || 0) + 1;
            current.name = user.first_name;
            return current;
        });
    }

    function toggleLeaderboard(show) {
        const modal = document.getElementById('leaderboard-modal');
        modal.style.display = show ? 'flex' : 'none';
        if (show) {
            db.ref('stats').orderByChild('wins').limitToLast(10).once('value', (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                let players = [];
                snap.forEach(child => { players.push(child.val()); });
                players.reverse().forEach((p, index) => {
                    list.innerHTML += `<div class="leaderboard-item"><span>${index+1}. ${p.name}</span><span><span class="win-text">W: ${p.wins || 0}</span> | <span class="loss-text">L: ${p.losses || 0}</span></span></div>`;
                });
            });
        }
    }

    function updateFirebase() {
        if (!gameId || gameOver) return;
        db.ref('games/' + gameId + '/lastMove').set({
            player: myRole,
            newBoard: JSON.stringify(board),
            newTurn: turn,
            ts: Date.now()
        });
    }

    function resignGame() {
        if (confirm("Rostdan ham taslim bo'lmoqchimisiz?")) {
            db.ref('games/' + gameId + '/event').set({ type: 'resign', by: user.id });
            finishGame(false, "Siz taslim bo'ldingiz!");
        }
    }

    function finishGame(won, message) {
        if (gameOver) return;
        gameOver = true;
        alert(message);
        updateStats(won);
        if (gameId) db.ref('games/' + gameId).remove();
        db.ref('presence/' + user.id).update({ inGame: false });
        setTimeout(() => location.reload(), 500);
    }

    function startGame(id, role, oppId, existingBoard = null) {
        inGame = true; gameId = id; myRole = role; opponentId = oppId;
        board = existingBoard ? JSON.parse(existingBoard) : getInitialBoard();
        document.getElementById('menu').style.display = 'none';
        document.getElementById('board').style.display = 'grid';
        document.getElementById('status').style.display = 'block';
        document.getElementById('resign-btn').style.display = 'block';
        const boardEl = document.getElementById('board');
        if (myRole === 'black') boardEl.classList.add('rotate-board');
        else boardEl.classList.remove('rotate-board');
        db.ref('games/' + gameId + '/lastMove').on('value', (snap) => {
            const data = snap.val();
            if (data && data.player !== myRole) { board = JSON.parse(data.newBoard); turn = data.newTurn; render(); }
        });
        db.ref('games/' + gameId + '/event').on('value', (snap) => {
            const ev = snap.val();
            if (ev && ev.by !== user.id && ev.type === 'resign') finishGame(true, "Raqib taslim bo'ldi! Siz g'olibsiz.");
        });
        db.ref('presence/' + opponentId + '/online').on('value', (snap) => {
            if (inGame && !gameOver && snap.val() === false) finishGame(true, "Raqib aloqadan chiqdi! Siz g'olibsiz.");
        });
        render();
        db.ref('presence/' + user.id).update({ inGame: true });
    }

    function getCaptureMoves(row, col, piece) {
        if (!piece || piece === "empty") return [];
        const moves = [];
        const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
        for (let [dr, dc] of dirs) {
            if (piece.king) {
                let r = row + dr;
                let c = col + dc;
                let foundEnemy = null;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const current = board[r][c];
                    if (current !== "empty") {
                        if (current.type === piece.type) break;
                        if (foundEnemy) break;
                        foundEnemy = {r, c};
                    } else if (foundEnemy) {
                        moves.push({ from: {r: row, c: col}, to: {r, c}, captured: {r: foundEnemy.r, c: foundEnemy.c} });
                    }
                    r += dr; c += dc;
                }
            } else {
                const midR = row + dr, midC = col + dc;
                const landR = row + 2 * dr, landC = col + 2 * dc;
                if (landR >= 0 && landR < 8 && landC >= 0 && landC < 8) {
                    const midPiece = board[midR][midC];
                    if (midPiece !== "empty" && midPiece.type !== piece.type && board[landR][landC] === "empty") {
                        moves.push({ from: {r: row, c: col}, to: {r: landR, c: landC}, captured: {r: midR, c: midC} });
                    }
                }
            }
        }
        return moves;
    }

    function tryMove(fromR, fromC, toR, toC) {
        const piece = board[fromR][fromC];
        const rowDiff = toR - fromR;
        const colDiff = toC - fromC;
        const absRow = Math.abs(rowDiff);
        const absCol = Math.abs(colDiff);
        if (absRow !== absCol || board[toR][toC] !== "empty") return false;
        const dr = rowDiff / absRow;
        const dc = colDiff / absCol;
        let piecesInWay = [];
        for (let i = 1; i < absRow; i++) {
            let r = fromR + i * dr;
            let c = fromC + i * dc;
            if (board[r][c] !== "empty") piecesInWay.push({r, c, type: board[r][c].type});
        }
        if (piecesInWay.length === 0 && !mustJumpAgain) {
            if (piece.king) return executeMove(fromR, fromC, toR, toC);
            if (absRow === 1) {
                if (piece.type === 'white' && rowDiff < 0) return executeMove(fromR, fromC, toR, toC);
                if (piece.type === 'black' && rowDiff > 0) return executeMove(fromR, fromC, toR, toC);
            }
        } else if (piecesInWay.length === 1) {
            const enemy = piecesInWay[0];
            if (enemy.type !== piece.type) {
                if (piece.king || absRow === 2) return executeMove(fromR, fromC, toR, toC, {r: enemy.r, c: enemy.c});
            }
        }
        return false;
    }

    function executeMove(fromR, fromC, toR, toC, capturedPiece = null) {
        const piece = board[fromR][fromC];
        if (capturedPiece) board[capturedPiece.r][capturedPiece.c] = "empty";
        board[toR][toC] = piece;
        board[fromR][fromC] = "empty";
        if ((piece.type === 'white' && toR === 0) || (piece.type === 'black' && toR === 7)) piece.king = true;
        if (capturedPiece && getCaptureMoves(toR, toC, board[toR][toC]).length > 0) {
            selected = { r: toR, c: toC };
            mustJumpAgain = true;
        } else {
            selected = null;
            mustJumpAgain = false;
            turn = (turn === 'white') ? 'black' : 'white';
        }
        updateFirebase();
        render();
        return true;
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white-cell' : 'black-cell'}`;
                cell.onclick = () => {
                    if (gameOver || turn !== myRole) return;
                    const piece = board[r][c];
                    if (selected) {
                        if (piece !== "empty" && piece.type === turn && !mustJumpAgain) selected = { r: r, c: c };
                        else tryMove(selected.r, selected.c, r, c);
                    } else if (piece !== "empty" && piece.type === turn) selected = { r: r, c: c };
                    render();
                };
                const piece = board[r][c];
                if (piece && piece !== "empty") {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = `piece ${piece.type}-piece ${piece.king ? 'king' : ''}`;
                    if (myRole === 'black') pieceDiv.classList.add('rotate-piece');
                    if (selected && selected.r === r && selected.c === c) pieceDiv.classList.add('selected');
                    cell.appendChild(pieceDiv);
                }
                boardDiv.appendChild(cell);
            }
        }
        document.getElementById('status').innerText = turn === 'white' ? "⚪ Oqlar yurishi" : "⚫ Qoralar yurishi";
        let w = 0, b = 0;
        board.forEach(row => row.forEach(p => { if (p.type === 'white') w++; if (p.type === 'black') b++; }));
        if ((w === 0 || b === 0) && !gameOver && inGame) {
            const winner = w === 0 ? 'black' : 'white';
            finishGame(myRole === winner, winner === 'black' ? "Qoralar yutdi!" : "Oqlar yutdi!");
        }
    }

    window.invite = function(targetId) {
        const newGameId = user.id + "_" + targetId;
        db.ref('invites/' + targetId).set({ fromId: user.id, fromName: user.first_name, gameId: newGameId, ts: Date.now() });
        startGame(newGameId, 'white', targetId);
    };

    db.ref('invites/' + user.id).on('value', (snap) => {
        const inv = snap.val();
        if (inv && !inGame && inv.ts > sessionStartTime) {
            if (confirm(inv.fromName + " taklif qildi. Qabul qilasizmi?")) {
                db.ref('invites/' + user.id).remove();
                startGame(inv.gameId, 'black', inv.fromId);
            }
        }
    });

    const myPresenceRef = db.ref('presence/' + user.id);
    myPresenceRef.set({ name: user.first_name, online: true, inGame: false });
    myPresenceRef.onDisconnect().update({ online: false, inGame: false });

    db.ref('presence').on('value', (snap) => {
        const listDiv = document.getElementById('online-list');
        listDiv.innerHTML = '';
        snap.forEach(child => {
            if (child.key !== user.id && child.val().online === true && !child.val().inGame) {
                listDiv.innerHTML += `<div class="user-item"><span>👤 ${child.val().name}</span> <button class="invite-btn" onclick="invite('${child.key}')">🎮 Taklif</button></div>`;
            }
        });
    });
</script>
</body>
</html>
