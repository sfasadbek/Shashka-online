<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Shashka Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- LOADING PROGRESS BAR CSS --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .progress-container { width: 70%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-top: 20px; }
        .progress-bar { width: 0%; height: 100%; background: #2ecc71; box-shadow: 0 0 15px #2ecc71; transition: width 0.3s ease; }
        #loading-text { color: white; font-size: 18px; font-family: sans-serif; letter-spacing: 2px; font-weight: 900; }

        /* --- ASOSIY CSS QISMI --- */
        * { box-sizing: border-box; touch-action: manipulation; }
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #1a1a1a; margin: 0; font-family: sans-serif; overflow: hidden; color: white; }
        
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #menu h1 { color: #f1c40f; margin-bottom: 20px; font-weight: 900; }
        
        /* Tugmalar uchun yangi dizayn */
        .top-btns { position: absolute; top: 20px; width: 90%; display: flex; justify-content: space-between; }
        .circle-btn { width: 50px; height: 50px; font-size: 25px; cursor: pointer; background: #2c2c2c; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid #f1c40f; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Profil va Leaderboard modallari */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { width: 90%; max-width: 400px; background: #2c2c2c; border-radius: 20px; padding: 25px; text-align: center; border: 2px solid #f1c40f; }
        
        .rank-tag { background: #f1c40f; color: black; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 14px; margin-top: 10px; display: inline-block; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #444; }

        .btn { background: #f1c40f; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 900; font-size: 18px; margin: 10px; cursor: pointer; width: 80%; text-transform: uppercase; }
        #online-list { width: 80%; max-height: 200px; overflow-y: auto; background: #2c2c2c; border-radius: 10px; padding: 10px; font-weight: 700; margin-top: 10px; }
        .user-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; align-items: center; }
        .invite-btn { background: #2ecc71; color: white; border: none; padding: 7px 12px; border-radius: 5px; cursor: pointer; font-weight: 900; }
        
        #status-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        #status { font-size: 5vw; font-weight: 900; text-transform: uppercase; text-align: center; background: #2c2c2c; padding: 10px 25px; border-radius: 30px; min-width: 220px; border: 2px solid #444; }
        #turn-timer { font-size: 5vw; color: #f1c40f; margin-top: 5px; font-weight: 900; }
        
        #board { width: 95vw; height: 95vw; max-width: 450px; max-height: 450px; border: 6px solid #3e2723; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); transition: transform 0.5s; background-color: #d7ccc8; }
        .cell { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .black-cell { background-color: #5d4037; }
        .white-cell { background-color: #d7ccc8; }
        .piece { width: 82%; height: 82%; border-radius: 50%; position: relative; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; }
        .white-piece { background: radial-gradient(circle, #ffffff, #e0e0e0); border: 2px solid #aaa; }
        .black-piece { background: radial-gradient(circle, #3a3a3a, #1a1a1a); border: 2px solid #333; }
        .selected { transform: scale(1.1); box-shadow: 0 0 15px #ffeb3b; border: 3px solid #ffeb3b; }
        .king::after { content: '👑'; font-size: 6vw; }
        #resign-btn { margin-top: 20px; background: #e74c3c; color: white; display: none; padding: 12px 25px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; }
        
        #game-over-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 500; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #winner-msg { font-size: 9vw; font-weight: 900; color: #f1c40f; margin-bottom: 15px; }
    </style>
</head>
<body>

<audio id="capture-sound" src="tosh yeyishi.mp3" preload="auto"></audio>
<audio id="move-sound" src="oddiy yurish.mp3" preload="auto"></audio>
<audio id="winner-sound" src="winner.mp3" preload="auto"></audio>
<audio id="loser-sound" src="loser.mp3" preload="auto"></audio>

<div id="loading-screen">
    <div id="loading-text">YUKLANMOQDA...</div>
    <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
</div>

<div id="menu" style="display: none;">
    <div class="top-btns">
        <div class="circle-btn" onclick="openProfile()">👤</div>
        <div class="circle-btn" onclick="toggleLeaderboard(true)">🏆</div>
    </div>
    <h1>♟️ SHASHKA ONLINE</h1>
    <p id="my-name" style="font-weight: 800;">Yuklanmoqda...</p>
    <div id="my-rank-short" class="rank-tag">Yangi o'yinchi</div>
    
    <h3 style="margin-top: 20px;">🟢 Onlayn o'yinchilar:</h3>
    <div id="online-list">Hozircha hech kim yo'q...</div>
    <br>
    <button class="btn" onclick="tg.close()">Chiqish</button>
</div>

<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin:0; color:#f1c40f;">PROFIL</h2>
        <h3 id="prof-name" style="margin: 10px 0;">Ism</h3>
        <div id="prof-rank" class="rank-tag">Rank</div>
        <div class="stats-grid">
            <div class="stat-box"><div style="color:#2ecc71; font-weight:900;" id="prof-wins">0</div>G'alaba</div>
            <div class="stat-box"><div style="color:#e74c3c; font-weight:900;" id="prof-loss">0</div>Mag'lubiyat</div>
        </div>
        <p id="next-rank-info" style="font-size: 12px; margin-top: 15px; color: #aaa;"></p>
        <button class="btn" onclick="closeProfile()">Yopish</button>
    </div>
</div>

<div id="leaderboard-modal" class="modal">
    <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
        <h2 style="font-weight: 900; color:#f1c40f;">🏆 Eng yaxshilar</h2>
        <div id="leaderboard-list"></div>
        <button class="btn" onclick="toggleLeaderboard(false)">Yopish</button>
    </div>
</div>

<div id="status-container" style="display:none;">
    <div id="status">Oqlar yurishi</div>
    <div id="turn-timer">Vaqt: 15</div>
</div>

<div id="board" style="display:none;"></div>
<button id="resign-btn" onclick="resignGame()">🏳️ Taslim bo'lish</button>

<div id="game-over-overlay">
    <div id="winner-msg"></div>
    <div id="exit-timer" style="color: white; font-weight: 800;">Menyuga qaytish: 10</div>
</div>

<script>
    // Ranklar ro'yxati
    const RANKS = [
        { min: 0, name: "Yangi o'yinchi", icon: "🌱" },
        { min: 10, name: "Havaskor", icon: "🥉" },
        { min: 25, name: "Usta", icon: "🥈" },
        { min: 50, name: "Grossmeyster", icon: "🥇" },
        { min: 100, name: "Shashka Qiroli", icon: "👑" }
    ];

    function getRank(wins) {
        let currentRank = RANKS[0];
        for (let r of RANKS) {
            if (wins >= r.min) currentRank = r;
        }
        return currentRank;
    }

    // --- Firebase & Telegram ---
    const firebaseConfig = {
        apiKey: "AIzaSyBCvV83aHz4VXCiUXykAmcxIj3mOCjeKaM",
        authDomain: "shashka-68221.firebaseapp.com",
        databaseURL: "https://shashka-68221-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "shashka-68221",
        storageBucket: "shashka-68221.firebasestorage.app",
        messagingSenderId: "1097688111504",
        appId: "1:1097688111504:web:e53a6b98195760972ebb15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe.user || { first_name: "Mehmon_" + Math.floor(Math.random()*10000), id: "guest_" + Date.now() };

    let myRole = '', gameId = '', board = [], turn = 'white', selected = null, mustJumpAgain = false, gameOver = false, inGame = false, opponentId = '', sessionStartTime = Date.now();
    let moveTimerInterval = null, secondsLeft = 15;

    // --- Statistika va Profil Funksiyalari ---
    function openProfile() {
        db.ref('stats/' + user.id).once('value', (snap) => {
            const data = snap.val() || { wins: 0, losses: 0 };
            const rank = getRank(data.wins || 0);
            document.getElementById('prof-name').innerText = user.first_name;
            document.getElementById('prof-wins').innerText = data.wins || 0;
            document.getElementById('prof-loss').innerText = data.losses || 0;
            document.getElementById('prof-rank').innerText = rank.icon + " " + rank.name;
            
            // Keyingi rank haqida ma'lumot
            const nextRank = RANKS.find(r => r.min > (data.wins || 0));
            if(nextRank) {
                document.getElementById('next-rank-info').innerText = `Keyingi rank (${nextRank.name}) uchun yana ${nextRank.min - data.wins} ta g'alaba kerak.`;
            } else {
                document.getElementById('next-rank-info').innerText = "Siz eng yuqori darajadasiz!";
            }
            document.getElementById('profile-modal').style.display = 'flex';
        });
    }

    function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

    function updateMyRankInMenu() {
        db.ref('stats/' + user.id).once('value', (snap) => {
            const wins = (snap.val() && snap.val().wins) ? snap.val().wins : 0;
            const rank = getRank(wins);
            document.getElementById('my-rank-short').innerText = rank.icon + " " + rank.name;
        });
    }

    // --- Qolgan barcha kod o'zgarmagan (faqat UI bog'landi) ---
    function startLoading() {
        let width = 0;
        const bar = document.getElementById('bar');
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
                updateMyRankInMenu();
            } else { width += 2; bar.style.width = width + '%'; }
        }, 30);
    }
    window.onload = startLoading;

    function playSound(id) {
        const sound = document.getElementById(id);
        if (sound) { sound.pause(); sound.currentTime = 0; sound.play().catch(() => {}); }
    }

    function startMoveTimer() {
        clearInterval(moveTimerInterval);
        secondsLeft = 15;
        document.getElementById('turn-timer').innerText = "Vaqt: " + secondsLeft;
        moveTimerInterval = setInterval(() => {
            if (gameOver) { clearInterval(moveTimerInterval); return; }
            secondsLeft--;
            document.getElementById('turn-timer').innerText = "Vaqt: " + secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(moveTimerInterval);
                if (turn === myRole) finishGame(false, "Vaqtingiz tugadi!");
            }
        }, 1000);
    }

    function getInitialBoard() {
        const newBoard = [];
        for (let r = 0; r < 8; r++) {
            newBoard[r] = [];
            for (let c = 0; c < 8; c++) {
                if ((r + c) % 2 !== 0) {
                    if (r < 3) newBoard[r][c] = { type: 'black', king: false };
                    else if (r > 4) newBoard[r][c] = { type: 'white', king: false };
                    else newBoard[r][c] = "empty";
                } else newBoard[r][c] = "empty";
            }
        }
        return newBoard;
    }

    function updateStats(won) {
        db.ref('stats/' + user.id).transaction((current) => {
            if (current === null) return { name: user.first_name, wins: won ? 1 : 0, losses: won ? 0 : 1 };
            if (won) current.wins = (current.wins || 0) + 1;
            else current.losses = (current.losses || 0) + 1;
            current.name = user.first_name;
            return current;
        });
    }

    function toggleLeaderboard(show) {
        const modal = document.getElementById('leaderboard-modal');
        modal.style.display = show ? 'flex' : 'none';
        if (show) {
            db.ref('stats').orderByChild('wins').limitToLast(10).once('value', (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                let players = [];
                snap.forEach(child => { players.push(child.val()); });
                players.reverse().forEach((p, index) => {
                    const r = getRank(p.wins || 0);
                    list.innerHTML += `<div class="user-item"><span>${index+1}. ${p.name} <br><small>${r.icon} ${r.name}</small></span><span><b style="color:#2ecc71">W:${p.wins||0}</b></span></div>`;
                });
            });
        }
    }

    function finishGame(won, message) {
        if (gameOver) return;
        gameOver = true;
        clearInterval(moveTimerInterval);
        document.getElementById('winner-msg').innerText = message;
        document.getElementById('game-over-overlay').style.display = 'flex';
        if (won) playSound('winner-sound'); else playSound('loser-sound');
        updateStats(won);
        if (gameId) db.ref('games/' + gameId).remove();
        db.ref('presence/' + user.id).update({ inGame: false });
        let timeLeft = 10;
        const exitInt = setInterval(() => {
            timeLeft--;
            document.getElementById('exit-timer').innerText = "Menyuga qaytish: " + timeLeft;
            if (timeLeft <= 0) { clearInterval(exitInt); location.reload(); }
        }, 1000);
    }

    // --- O'yin logikasi (O'zgarmagan) ---
    function startGame(id, role, oppId, existingBoard = null) {
        inGame = true; gameId = id; myRole = role; opponentId = oppId;
        board = existingBoard ? JSON.parse(existingBoard) : getInitialBoard();
        document.getElementById('menu').style.display = 'none';
        document.getElementById('board').style.display = 'grid';
        document.getElementById('status-container').style.display = 'flex';
        document.getElementById('resign-btn').style.display = 'block';
        if (myRole === 'black') document.getElementById('board').classList.add('rotate-board');
        db.ref('games/' + gameId + '/lastMove').on('value', (snap) => {
            const data = snap.val();
            if (data && data.player !== myRole) { 
                board = JSON.parse(data.newBoard); turn = data.newTurn; 
                if (data.hadCapture) playSound('capture-sound'); else playSound('move-sound');
                render(); startMoveTimer();
            }
        });
        db.ref('games/' + gameId + '/event').on('value', (snap) => {
            const ev = snap.val();
            if (ev && ev.by !== user.id && ev.type === 'resign') finishGame(true, "Raqib taslim bo'ldi!");
        });
        render(); startMoveTimer();
        db.ref('presence/' + user.id).update({ inGame: true });
    }

    function updateFirebase(hadCapture = false) {
        if (!gameId || gameOver) return;
        db.ref('games/' + gameId + '/lastMove').set({
            player: myRole, newBoard: JSON.stringify(board), newTurn: turn, ts: Date.now(), hadCapture: hadCapture
        });
    }

    function resignGame() {
        if (confirm("Taslim bo'lasizmi?")) {
            db.ref('games/' + gameId + '/event').set({ type: 'resign', by: user.id });
            finishGame(false, "Siz taslim bo'ldingiz!");
        }
    }

    function render() {
        const boardDiv = document.getElementById('board');
        boardDiv.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r + c) % 2 === 0 ? 'white-cell' : 'black-cell'}`;
                cell.onclick = () => {
                    if (gameOver || turn !== myRole) return;
                    const piece = board[r][c];
                    if (selected) {
                        if (piece !== "empty" && piece.type === turn && !mustJumpAgain) selected = { r: r, c: c };
                        else tryMove(selected.r, selected.c, r, c);
                    } else if (piece !== "empty" && piece.type === turn) selected = { r: r, c: c };
                    render();
                };
                const piece = board[r][c];
                if (piece && piece !== "empty") {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = `piece ${piece.type}-piece ${piece.king ? 'king' : ''}`;
                    if (selected && selected.r === r && selected.c === c) pieceDiv.classList.add('selected');
                    cell.appendChild(pieceDiv);
                }
                boardDiv.appendChild(cell);
            }
        }
        document.getElementById('status').innerText = turn === 'white' ? "⚪ Oqlar yurishi" : "⚫ Qoralar yurishi";
        let w = 0, b = 0;
        board.forEach(row => row.forEach(p => { if (p.type === 'white') w++; if (p.type === 'black') b++; }));
        if ((w === 0 || b === 0) && !gameOver && inGame) {
            const winner = w === 0 ? 'black' : 'white';
            finishGame(myRole === winner, winner === 'white' ? "Oqlar yutdi!" : "Qoralar yutdi!");
        }
    }

    function getCaptureMoves(row, col, piece) {
        if (!piece || piece === "empty") return [];
        const moves = [];
        const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];
        for (let [dr, dc] of dirs) {
            if (piece.king) {
                let r = row + dr; let c = col + dc; let foundEnemy = null;
                while (r >= 0 && r < 8 && c >= 0 && c < 8) {
                    const curr = board[r][c];
                    if (curr !== "empty") {
                        if (curr.type === piece.type) break;
                        if (foundEnemy) break;
                        foundEnemy = {r, c};
                    } else if (foundEnemy) moves.push({ from: {r: row, c: col}, to: {r, c}, captured: {r: foundEnemy.r, c: foundEnemy.c} });
                    r += dr; c += dc;
                }
            } else {
                const landR = row + 2*dr, landC = col + 2*dc;
                if (landR >= 0 && landR < 8 && landC >= 0 && landC < 8) {
                    const mid = board[row+dr][col+dc];
                    if (mid !== "empty" && mid.type !== piece.type && board[landR][landC] === "empty")
                        moves.push({ from: {r: row, c: col}, to: {r: landR, c: landC}, captured: {r: row+dr, c: col+dc} });
                }
            }
        }
        return moves;
    }

    function tryMove(fR, fC, tR, tC) {
        const piece = board[fR][fC];
        const rD = tR - fR, cD = tC - fC, absR = Math.abs(rD);
        if (absR !== Math.abs(cD) || board[tR][tC] !== "empty") return false;
        const dr = rD/absR, dc = cD/absR;
        let way = [];
        for (let i = 1; i < absR; i++) if (board[fR+i*dr][fC+i*dc] !== "empty") way.push({r: fR+i*dr, c: fC+i*dc, type: board[fR+i*dr][fC+i*dc].type});
        
        if (way.length === 0 && !mustJumpAgain) {
            if (piece.king || (piece.type === 'white' && rD < 0) || (piece.type === 'black' && rD > 0)) return executeMove(fR, fC, tR, tC);
        } else if (way.length === 1 && way[0].type !== piece.type) return executeMove(fR, fC, tR, tC, way[0]);
        return false;
    }

    function executeMove(fR, fC, tR, tC, cap = null) {
        const piece = board[fR][fC];
        if (cap) { board[cap.r][cap.c] = "empty"; playSound('capture-sound'); } else playSound('move-sound');
        board[tR][tC] = piece; board[fR][fC] = "empty";
        if ((piece.type === 'white' && tR === 0) || (piece.type === 'black' && tR === 7)) piece.king = true;
        if (cap && getCaptureMoves(tR, tC, board[tR][tC]).length > 0) { selected = { r: tR, c: tC }; mustJumpAgain = true; }
        else { selected = null; mustJumpAgain = false; turn = (turn === 'white') ? 'black' : 'white'; startMoveTimer(); }
        updateFirebase(!!cap); render(); return true;
    }

    window.invite = function(id) {
        const gid = user.id + "_" + id;
        db.ref('invites/' + id).set({ fromId: user.id, fromName: user.first_name, gameId: gid, ts: Date.now() });
        startGame(gid, 'white', id);
    };

    db.ref('invites/' + user.id).on('value', (snap) => {
        const inv = snap.val();
        if (inv && !inGame && inv.ts > sessionStartTime) {
            if (confirm(inv.fromName + " taklif qildi. Qabul qilasizmi?")) {
                db.ref('invites/' + user.id).remove();
                startGame(inv.gameId, 'black', inv.fromId);
            }
        }
    });

    const myPres = db.ref('presence/' + user.id);
    myPres.set({ name: user.first_name, online: true, inGame: false });
    myPres.onDisconnect().update({ online: false, inGame: false });
    db.ref('presence').on('value', (snap) => {
        const list = document.getElementById('online-list');
        list.innerHTML = '';
        snap.forEach(c => {
            if (c.key !== user.id && c.val().online && !c.val().inGame)
                list.innerHTML += `<div class="user-item"><span>👤 ${c.val().name}</span> <button class="invite-btn" onclick="invite('${c.key}')">🎮 Taklif</button></div>`;
        });
    });
    document.getElementById('my-name').innerText = "👋 Salom, " + user.first_name;
</script>
</body>
</html>
